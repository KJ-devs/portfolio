<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a0a0f"/>
  <!-- 3D scene background (simplified) -->
  <circle cx="300" cy="250" r="16" fill="#00d4ff" opacity="0.2"/>
  <circle cx="200" cy="180" r="10" fill="#a855f7" opacity="0.15"/>
  <circle cx="350" cy="150" r="8" fill="#10b981" opacity="0.15"/>
  <line x1="300" y1="250" x2="200" y2="180" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="300" y1="250" x2="350" y2="150" stroke="#ffffff" stroke-opacity="0.05"/>
  <!-- Panel overlay -->
  <rect x="480" y="0" width="320" height="500" fill="#0a0a0f" opacity="0.85"/>
  <rect x="480" y="0" width="320" height="500" fill="none" stroke="#a855f7" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="480" y="0" width="200" height="2" fill="#a855f7" opacity="0.6"/>
  <!-- Panel header -->
  <rect x="500" y="25" width="10" height="10" rx="2" fill="#a855f7" opacity="0.5"/>
  <rect x="518" y="26" width="60" height="8" rx="2" fill="#a855f7" opacity="0.3"/>
  <rect x="500" y="48" width="180" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="760" y="25" width="24" height="24" rx="6" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <!-- Description -->
  <rect x="500" y="90" width="260" height="6" rx="2" fill="#ffffff" opacity="0.12"/>
  <rect x="500" y="102" width="240" height="6" rx="2" fill="#ffffff" opacity="0.1"/>
  <rect x="500" y="114" width="200" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <!-- Stack badges -->
  <rect x="500" y="140" width="55" height="20" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3"/>
  <rect x="565" y="140" width="45" height="20" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3"/>
  <rect x="620" y="140" width="50" height="20" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3"/>
  <rect x="500" y="168" width="60" height="20" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3"/>
  <rect x="570" y="168" width="40" height="20" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3"/>
  <!-- Highlights -->
  <rect x="510" y="210" width="6" height="6" rx="1" fill="#a855f7" opacity="0.5"/>
  <rect x="524" y="210" width="220" height="6" rx="2" fill="#ffffff" opacity="0.1"/>
  <rect x="510" y="228" width="6" height="6" rx="1" fill="#a855f7" opacity="0.5"/>
  <rect x="524" y="228" width="200" height="6" rx="2" fill="#ffffff" opacity="0.1"/>
  <rect x="510" y="246" width="6" height="6" rx="1" fill="#a855f7" opacity="0.5"/>
  <rect x="524" y="246" width="180" height="6" rx="2" fill="#ffffff" opacity="0.1"/>
  <!-- Links -->
  <rect x="500" y="280" width="80" height="30" rx="8" fill="#ffffff" opacity="0.08"/>
  <rect x="590" y="280" width="60" height="30" rx="8" fill="#a855f7" opacity="0.2"/>
  <!-- Connections section -->
  <rect x="500" y="340" width="100" height="8" rx="2" fill="#a855f7" opacity="0.2"/>
  <rect x="500" y="365" width="50" height="24" rx="6" fill="#00d4ff" opacity="0.08" stroke="#00d4ff" stroke-opacity="0.2"/>
  <rect x="560" y="365" width="60" height="24" rx="6" fill="#00d4ff" opacity="0.08" stroke="#00d4ff" stroke-opacity="0.2"/>
  <rect x="630" y="365" width="55" height="24" rx="6" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-opacity="0.2"/>
  <rect x="500" y="400" width="65" height="24" rx="6" fill="#a855f7" opacity="0.08" stroke="#a855f7" stroke-opacity="0.2"/>
  <rect x="575" y="400" width="45" height="24" rx="6" fill="#f472b6" opacity="0.08" stroke="#f472b6" stroke-opacity="0.2"/>
  <text x="400" y="490" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.4" text-anchor="middle">Neural Portfolio — Info Panel</text>
</svg>
