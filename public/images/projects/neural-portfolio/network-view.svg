<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a0a0f"/>
  <!-- Neural connections -->
  <line x1="400" y1="220" x2="250" y2="120" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="400" y1="220" x2="550" y2="100" stroke="#00d4ff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="400" y1="220" x2="200" y2="300" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="400" y1="220" x2="600" y2="280" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="400" y1="220" x2="300" y2="380" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="400" y1="220" x2="520" y2="400" stroke="#10b981" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="400" y1="220" x2="150" y2="200" stroke="#f472b6" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="400" y1="220" x2="650" y2="180" stroke="#f472b6" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="250" y1="120" x2="150" y2="80" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="250" y1="120" x2="350" y2="60" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="550" y1="100" x2="650" y2="60" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="200" y1="300" x2="100" y2="350" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="600" y1="280" x2="700" y2="330" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Central neuron (me) -->
  <circle cx="400" cy="220" r="24" fill="#F5E6CC" opacity="0.15"/>
  <circle cx="400" cy="220" r="18" fill="#F5E6CC" opacity="0.25"/>
  <circle cx="400" cy="220" r="8" fill="#F5E6CC" opacity="0.5"/>
  <!-- Skill neurons -->
  <circle cx="250" cy="120" r="12" fill="#00d4ff" opacity="0.3"/>
  <circle cx="550" cy="100" r="14" fill="#00d4ff" opacity="0.3"/>
  <circle cx="150" cy="80" r="8" fill="#00d4ff" opacity="0.2"/>
  <circle cx="350" cy="60" r="10" fill="#00d4ff" opacity="0.2"/>
  <circle cx="650" cy="60" r="9" fill="#00d4ff" opacity="0.2"/>
  <!-- Project neurons -->
  <circle cx="200" cy="300" r="14" fill="#a855f7" opacity="0.3"/>
  <circle cx="600" cy="280" r="12" fill="#a855f7" opacity="0.3"/>
  <circle cx="100" cy="350" r="8" fill="#a855f7" opacity="0.2"/>
  <circle cx="700" cy="330" r="7" fill="#a855f7" opacity="0.2"/>
  <!-- Experience neurons -->
  <circle cx="300" cy="380" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="520" cy="400" r="10" fill="#10b981" opacity="0.3"/>
  <!-- Contact neurons -->
  <circle cx="150" cy="200" r="7" fill="#f472b6" opacity="0.3"/>
  <circle cx="650" cy="180" r="7" fill="#f472b6" opacity="0.3"/>
  <!-- Particles (dots on connections) -->
  <circle cx="320" cy="170" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="480" cy="160" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="300" cy="260" r="2" fill="#a855f7" opacity="0.6"/>
  <circle cx="500" cy="250" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="350" cy="300" r="2" fill="#10b981" opacity="0.6"/>
  <!-- Stars background -->
  <circle cx="50" cy="30" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="750" cy="450" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="680" cy="40" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="120" cy="450" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="400" cy="470" r="1" fill="#ffffff" opacity="0.15"/>
  <text x="400" y="490" font-family="monospace" font-size="11" fill="#F5E6CC" opacity="0.4" text-anchor="middle">Neural Portfolio — Réseau 3D</text>
</svg>
