<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a0a0f"/>
  <!-- Main concept card -->
  <rect x="150" y="40" width="500" height="380" rx="16" fill="#1a1030" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Header -->
  <rect x="170" y="60" width="120" height="24" rx="12" fill="#a855f7" opacity="0.2"/>
  <rect x="185" y="68" width="90" height="8" rx="2" fill="#a855f7" opacity="0.6"/>
  <rect x="170" y="100" width="300" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <!-- Content blocks -->
  <rect x="170" y="140" width="460" height="100" rx="8" fill="#00d4ff" opacity="0.05" stroke="#00d4ff" stroke-opacity="0.15"/>
  <rect x="190" y="155" width="80" height="8" rx="2" fill="#00d4ff" opacity="0.5"/>
  <rect x="190" y="175" width="400" height="6" rx="2" fill="#ffffff" opacity="0.12"/>
  <rect x="190" y="190" width="380" height="6" rx="2" fill="#ffffff" opacity="0.1"/>
  <rect x="190" y="205" width="350" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="190" y="220" width="300" height="6" rx="2" fill="#ffffff" opacity="0.06"/>
  <!-- Key points -->
  <rect x="170" y="260" width="220" height="60" rx="8" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-opacity="0.2"/>
  <circle cx="190" cy="280" r="6" fill="#10b981" opacity="0.4"/>
  <rect x="205" y="276" width="160" height="8" rx="2" fill="#ffffff" opacity="0.15"/>
  <circle cx="190" cy="300" r="6" fill="#10b981" opacity="0.4"/>
  <rect x="205" y="296" width="140" height="8" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="410" y="260" width="220" height="60" rx="8" fill="#f472b6" opacity="0.08" stroke="#f472b6" stroke-opacity="0.2"/>
  <circle cx="430" cy="280" r="6" fill="#f472b6" opacity="0.4"/>
  <rect x="445" y="276" width="160" height="8" rx="2" fill="#ffffff" opacity="0.15"/>
  <circle cx="430" cy="300" r="6" fill="#f472b6" opacity="0.4"/>
  <rect x="445" y="296" width="140" height="8" rx="2" fill="#ffffff" opacity="0.15"/>
  <!-- AI badge -->
  <rect x="170" y="340" width="460" height="40" rx="8" fill="#a855f7" opacity="0.06"/>
  <rect x="190" y="352" width="16" height="16" rx="4" fill="#a855f7" opacity="0.4"/>
  <rect x="215" y="355" width="150" height="8" rx="2" fill="#a855f7" opacity="0.3"/>
  <!-- Progress -->
  <rect x="170" y="395" width="460" height="6" rx="3" fill="#ffffff" opacity="0.05"/>
  <rect x="170" y="395" width="280" height="6" rx="3" fill="#a855f7" opacity="0.4"/>
  <text x="400" y="460" font-family="monospace" font-size="11" fill="#00d4ff" opacity="0.4" text-anchor="middle">EduFeed — Concept Card IA</text>
